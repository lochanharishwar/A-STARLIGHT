<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>A-STARLIGHT — Cosmic Exploration Platform</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;900&family=Exo+2:wght@200;300;400;500;600&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">

  <style>

    /* ════════════════════════════════════════════════
       TOKENS
    ════════════════════════════════════════════════ */
    :root {
      /* Backgrounds */
      --bg-base:      #01020f;
      --bg-surface:   #080c1e;
      --bg-elevated:  #0d1230;

      /* Brand */
      --blue:         #3b82f6;
      --blue-light:   #93c5fd;
      --blue-dim:     rgba(59,130,246,0.15);
      --blue-glow:    rgba(59,130,246,0.4);

      --cyan:         #22d3ee;
      --cyan-dim:     rgba(34,211,238,0.12);
      --cyan-glow:    rgba(34,211,238,0.35);

      --violet:       #8b5cf6;
      --violet-dim:   rgba(139,92,246,0.12);
      --violet-glow:  rgba(139,92,246,0.35);

      --gold:         #fbbf24;
      --gold-dim:     rgba(251,191,36,0.12);
      --gold-glow:    rgba(251,191,36,0.35);

      --emerald:      #10b981;
      --rose:         #f43f5e;

      /* Text */
      --text-primary:   #e2e8f8;
      --text-secondary: #7c8db5;
      --text-muted:     #3d4f75;

      /* Borders */
      --border:         rgba(59,130,246,0.14);
      --border-bright:  rgba(59,130,246,0.35);
      --border-subtle:  rgba(255,255,255,0.04);

      /* Panels */
      --panel-bg:     rgba(8,12,30,0.95);
      --panel-hover:  rgba(13,18,48,0.98);

      /* Radius */
      --r-sm:   6px;
      --r-md:   10px;
      --r-lg:   16px;
      --r-xl:   22px;

      /* Fonts */
      --f-display: 'Orbitron',      monospace;
      --f-body:    'Exo 2',         sans-serif;
      --f-mono:    'JetBrains Mono',monospace;

      /* Transitions */
      --ease:    cubic-bezier(0.4,0,0.2,1);
      --ease-out:cubic-bezier(0,0,0.2,1);
    }

    /* ════════════════════════════════════════════════
       RESET & BASE
    ════════════════════════════════════════════════ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html {
      scroll-behavior: smooth;
      color-scheme: dark;
      font-size: 16px;
    }

    body {
      font-family: var(--f-body);
      background: var(--bg-base);
      color: var(--text-primary);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overflow-x: hidden;
      min-height: 100vh;
      line-height: 1.6;
    }

    /* Interactive elements */
    a, button, [role="button"], label,
    input[type="checkbox"], input[type="radio"] { cursor: pointer; }

    /* ════════════════════════════════════════════════
       SCROLLBAR
    ════════════════════════════════════════════════ */
    ::-webkit-scrollbar              { width: 3px; height: 3px; }
    ::-webkit-scrollbar-track        { background: var(--bg-base); }
    ::-webkit-scrollbar-thumb        { background: var(--violet); border-radius: 99px; }
    ::-webkit-scrollbar-thumb:hover  { background: var(--blue); }

    /* ════════════════════════════════════════════════
       SELECTION & FOCUS
    ════════════════════════════════════════════════ */
    ::selection {
      background: rgba(59,130,246,0.28);
      color: var(--blue-light);
    }
    :focus-visible {
      outline: 1.5px solid var(--cyan);
      outline-offset: 3px;
      border-radius: var(--r-sm);
    }

    /* ════════════════════════════════════════════════
       BACKGROUND SYSTEM
    ════════════════════════════════════════════════ */
    .galaxy-background {
      position: fixed;
      inset: 0;
      z-index: -1;
      overflow: hidden;
      background:
        radial-gradient(ellipse 80% 60% at 20% 50%,  rgba(59,130,246,0.07) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 80% 30%,  rgba(139,92,246,0.06) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 60% 80%,  rgba(34,211,238,0.05) 0%, transparent 60%),
        linear-gradient(160deg, #020415 0%, #01020f 50%, #030418 100%);
    }

    /* ── Stars (two independent layers, opposite drift) ── */
    .starfield-bg {
      position: absolute;
      inset: -60%;
      width: 220%;
      height: 220%;
      background-image:
        /* bright sharp stars */
        radial-gradient(1.2px 1.2px at  8% 12%, rgba(255,255,255,0.95) 0%,transparent 100%),
        radial-gradient(0.8px 0.8px at 23% 47%, rgba(220,235,255,0.85) 0%,transparent 100%),
        radial-gradient(1.4px 1.4px at 67% 22%, rgba(255,255,255,0.90) 0%,transparent 100%),
        radial-gradient(0.7px 0.7px at 41% 78%, rgba(200,220,255,0.80) 0%,transparent 100%),
        radial-gradient(1.1px 1.1px at 88% 55%, rgba(255,250,220,0.85) 0%,transparent 100%),
        radial-gradient(0.9px 0.9px at 15% 88%, rgba(255,255,255,0.75) 0%,transparent 100%),
        radial-gradient(1.3px 1.3px at 54% 33%, rgba(220,240,255,0.88) 0%,transparent 100%),
        radial-gradient(0.6px 0.6px at 76% 71%, rgba(255,255,255,0.70) 0%,transparent 100%),
        radial-gradient(1.0px 1.0px at 33% 15%, rgba(255,245,200,0.82) 0%,transparent 100%),
        radial-gradient(0.8px 0.8px at 92% 38%, rgba(200,215,255,0.78) 0%,transparent 100%),
        /* dim background stars */
        radial-gradient(0.5px 0.5px at 18% 63%, rgba(255,255,255,0.50) 0%,transparent 100%),
        radial-gradient(0.4px 0.4px at 44% 91%, rgba(200,220,255,0.45) 0%,transparent 100%),
        radial-gradient(0.6px 0.6px at 71% 44%, rgba(255,255,255,0.55) 0%,transparent 100%),
        radial-gradient(0.4px 0.4px at 59% 6%,  rgba(230,240,255,0.48) 0%,transparent 100%),
        radial-gradient(0.5px 0.5px at 83% 82%, rgba(255,255,255,0.42) 0%,transparent 100%),
        radial-gradient(0.3px 0.3px at  5% 35%, rgba(200,215,255,0.40) 0%,transparent 100%),
        radial-gradient(0.5px 0.5px at 37% 58%, rgba(255,255,255,0.45) 0%,transparent 100%),
        radial-gradient(0.4px 0.4px at 95% 17%, rgba(255,250,230,0.42) 0%,transparent 100%);
      background-repeat: repeat;
      background-size:
        700px 700px, 780px 780px, 650px 650px, 820px 820px, 740px 740px,
        590px 590px, 670px 670px, 860px 860px, 610px 610px, 720px 720px,
        450px 450px, 480px 480px, 510px 510px, 440px 440px, 530px 530px,
        470px 470px, 460px 460px, 490px 490px;
      animation: starDrift 380s linear infinite;
      will-change: transform;
    }

    @keyframes starDrift {
      from { transform: rotate(0deg)   translateZ(0); }
      to   { transform: rotate(360deg) translateZ(0); }
    }

    /* ── Aurora bands (the "wow" layer) ── */
    .aurora {
      position: absolute;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
    }

    .aurora-band {
      position: absolute;
      border-radius: 50%;
      mix-blend-mode: screen;
    }

    .aurora-band--1 {
      width: 90vw; height: 35vh;
      top: -8vh; left: -10vw;
      background: linear-gradient(135deg,
        rgba(59,130,246,0.12) 0%,
        rgba(139,92,246,0.09) 40%,
        rgba(34,211,238,0.06) 70%,
        transparent 100%
      );
      animation: auroraDrift1 22s ease-in-out infinite;
      filter: blur(22px);
    }

    .aurora-band--2 {
      width: 70vw; height: 28vh;
      bottom: -6vh; right: -8vw;
      background: linear-gradient(315deg,
        rgba(139,92,246,0.10) 0%,
        rgba(59,130,246,0.08) 50%,
        rgba(34,211,238,0.05) 80%,
        transparent 100%
      );
      animation: auroraDrift2 28s ease-in-out infinite 4s;
      filter: blur(20px);
    }

    .aurora-band--3 {
      width: 55vw; height: 22vh;
      top: 40%; left: 25%;
      background: radial-gradient(ellipse at center,
        rgba(34,211,238,0.07) 0%,
        rgba(59,130,246,0.04) 50%,
        transparent 100%
      );
      animation: auroraDrift3 18s ease-in-out infinite 8s;
      filter: blur(30px);
    }

    @keyframes auroraDrift1 {
      0%,100% { transform: translateX(0)    scaleY(1);    opacity: 0.7; }
      33%      { transform: translateX(4vw)  scaleY(1.15); opacity: 1.0; }
      66%      { transform: translateX(-3vw) scaleY(0.90); opacity: 0.8; }
    }
    @keyframes auroraDrift2 {
      0%,100% { transform: translateX(0)    scaleY(1);    opacity: 0.65; }
      40%      { transform: translateX(-5vw) scaleY(1.2);  opacity: 1.0;  }
      70%      { transform: translateX(2vw)  scaleY(0.85); opacity: 0.75; }
    }
    @keyframes auroraDrift3 {
      0%,100% { transform: scale(1)    translateY(0);    opacity: 0.5; }
      50%      { transform: scale(1.15) translateY(-2vh); opacity: 0.9; }
    }

    /* ── Galaxy disc ── */
    .galaxy-container {
      position: absolute;
      top: 50%; left: 50%;
      width: 105vmax; height: 105vmax;
      transform-style: preserve-3d;
      animation: galaxySpin 300s linear infinite;
      will-change: transform;
    }

    @keyframes galaxySpin {
      from { transform: translate(-50%,-50%) rotateZ(0deg); }
      to   { transform: translate(-50%,-50%) rotateZ(360deg); }
    }

    .galaxy {
      position: absolute; inset: 0;
      border-radius: 50%;
      transform: rotateX(74deg);
      background: radial-gradient(ellipse at center,
        rgba(251,191,36,0.18) 0%,
        rgba(139,92,246,0.10) 22%,
        rgba(59,130,246,0.07) 42%,
        rgba(34,211,238,0.04) 58%,
        transparent 70%
      );
    }

    .galaxy::before, .galaxy::after {
      content: ''; position: absolute; inset: 0; border-radius: 50%;
    }
    .galaxy::before {
      background:
        radial-gradient(ellipse 50% 18% at 65% 36%, rgba(167,139,250,0.10) 0%, transparent 100%),
        radial-gradient(ellipse 38% 14% at 34% 64%, rgba(96,165,250,0.08)  0%, transparent 100%);
      animation: armSpin 26s linear infinite;
    }
    .galaxy::after {
      background:
        radial-gradient(ellipse 42% 16% at 38% 33%, rgba(251,191,36,0.07)  0%, transparent 100%),
        radial-gradient(ellipse 32% 11% at 62% 67%, rgba(167,139,250,0.07) 0%, transparent 100%);
      animation: armSpin 20s linear infinite reverse;
    }

    @keyframes armSpin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    /* ── Vignette ── */
    .vignette {
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 70% 70% at 50% 50%,
        transparent 30%, rgba(1,2,15,0.80) 100%
      );
      pointer-events: none;
      z-index: 2;
    }

    /* ── Subtle grid ── */
    .grid-overlay {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(59,130,246,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(59,130,246,0.025) 1px, transparent 1px);
      background-size: 80px 80px;
      pointer-events: none;
      z-index: 1;
    }

    /* ════════════════════════════════════════════════
       HUD CORNERS
    ════════════════════════════════════════════════ */
    .hud-corner {
      position: fixed;
      width: 20px; height: 20px;
      z-index: 100;
      pointer-events: none;
      opacity: 0.45;
      transition: opacity 0.3s;
    }
    .hud-corner--tl { top: 14px; left: 14px;
      border-top: 1.5px solid var(--cyan); border-left: 1.5px solid var(--cyan); }
    .hud-corner--tr { top: 14px; right: 14px;
      border-top: 1.5px solid var(--cyan); border-right: 1.5px solid var(--cyan); }
    .hud-corner--bl { bottom: 14px; left: 14px;
      border-bottom: 1.5px solid var(--cyan); border-left: 1.5px solid var(--cyan); }
    .hud-corner--br { bottom: 14px; right: 14px;
      border-bottom: 1.5px solid var(--cyan); border-right: 1.5px solid var(--cyan); }

    /* ════════════════════════════════════════════════
       PANEL / CARD SYSTEM
    ════════════════════════════════════════════════ */
    .cosmos-panel {
      background: var(--panel-bg);
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
      box-shadow:
        0 0 0 1px var(--border-subtle) inset,
        0 4px 6px  rgba(0,0,0,0.4),
        0 12px 40px rgba(0,0,0,0.55),
        0 0 0 0 transparent;
      transition: border-color 0.25s var(--ease), box-shadow 0.25s var(--ease);
    }
    .cosmos-panel:hover {
      border-color: rgba(59,130,246,0.28);
      box-shadow:
        0 0 0 1px var(--border-subtle) inset,
        0 4px 6px  rgba(0,0,0,0.4),
        0 12px 40px rgba(0,0,0,0.55),
        0 0 30px rgba(59,130,246,0.06);
    }

    /* Glowing accent line at top */
    .cosmos-panel--accented {
      position: relative;
      overflow: hidden;
    }
    .cosmos-panel--accented::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg,
        transparent 0%,
        var(--blue) 25%,
        var(--cyan) 75%,
        transparent 100%
      );
      opacity: 0.6;
    }

    /* ════════════════════════════════════════════════
       BUTTONS
    ════════════════════════════════════════════════ */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-family: var(--f-body);
      font-size: 0.875rem;
      font-weight: 500;
      letter-spacing: 0.02em;
      border-radius: var(--r-md);
      padding: 9px 18px;
      border: 1px solid transparent;
      cursor: pointer;
      transition: all 0.2s var(--ease);
      white-space: nowrap;
    }
    .btn--primary {
      background: linear-gradient(135deg, var(--blue) 0%, #2563eb 100%);
      color: #fff;
      border-color: rgba(59,130,246,0.5);
      box-shadow: 0 0 20px rgba(59,130,246,0.25), 0 2px 8px rgba(0,0,0,0.4);
    }
    .btn--primary:hover {
      background: linear-gradient(135deg, #60a5fa 0%, var(--blue) 100%);
      box-shadow: 0 0 28px rgba(59,130,246,0.40), 0 2px 8px rgba(0,0,0,0.4);
      transform: translateY(-1px);
    }
    .btn--ghost {
      background: transparent;
      color: var(--text-secondary);
      border-color: var(--border);
    }
    .btn--ghost:hover {
      background: var(--blue-dim);
      color: var(--blue-light);
      border-color: var(--border-bright);
    }
    .btn--cyan {
      background: linear-gradient(135deg, rgba(34,211,238,0.15) 0%, rgba(34,211,238,0.08) 100%);
      color: var(--cyan);
      border-color: rgba(34,211,238,0.30);
    }
    .btn--cyan:hover {
      background: linear-gradient(135deg, rgba(34,211,238,0.25) 0%, rgba(34,211,238,0.15) 100%);
      box-shadow: 0 0 20px rgba(34,211,238,0.20);
      transform: translateY(-1px);
    }

    /* ════════════════════════════════════════════════
       BADGE / TAG
    ════════════════════════════════════════════════ */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-family: var(--f-mono);
      font-size: 0.65rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 3px 9px;
      border-radius: 99px;
      border: 1px solid currentColor;
    }
    .badge--blue   { color: var(--blue);   background: var(--blue-dim);   border-color: rgba(59,130,246,0.30); }
    .badge--cyan   { color: var(--cyan);   background: var(--cyan-dim);   border-color: rgba(34,211,238,0.28); }
    .badge--violet { color: var(--violet); background: var(--violet-dim); border-color: rgba(139,92,246,0.28); }
    .badge--gold   { color: var(--gold);   background: var(--gold-dim);   border-color: rgba(251,191,36,0.28); }

    /* ════════════════════════════════════════════════
       TYPOGRAPHY UTILITIES
    ════════════════════════════════════════════════ */
    .font-display { font-family: var(--f-display); }
    .font-mono-ui { font-family: var(--f-mono); }

    .text-gradient-blue {
      background: linear-gradient(135deg, var(--blue-light) 0%, var(--cyan) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .text-gradient-gold {
      background: linear-gradient(135deg, var(--gold) 0%, #fb923c 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .text-glow-blue   { text-shadow: 0 0 16px var(--blue-glow),   0 0 40px rgba(59,130,246,0.15); }
    .text-glow-cyan   { text-shadow: 0 0 14px var(--cyan-glow),   0 0 36px rgba(34,211,238,0.12); }
    .text-glow-violet { text-shadow: 0 0 14px var(--violet-glow), 0 0 36px rgba(139,92,246,0.12); }
    .text-glow-gold   { text-shadow: 0 0 14px var(--gold-glow); }

    /* ════════════════════════════════════════════════
       INPUT / FORM
    ════════════════════════════════════════════════ */
    .cosmos-input {
      font-family: var(--f-body);
      font-size: 0.9rem;
      color: var(--text-primary);
      background: rgba(8,12,30,0.9);
      border: 1px solid var(--border);
      border-radius: var(--r-md);
      padding: 10px 14px;
      width: 100%;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
    }
    .cosmos-input::placeholder { color: var(--text-muted); }
    .cosmos-input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(59,130,246,0.12);
    }

    /* ════════════════════════════════════════════════
       DIVIDER
    ════════════════════════════════════════════════ */
    .cosmos-divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--border-bright), transparent);
      border: none;
      margin: 0;
      opacity: 0.5;
    }

    /* ════════════════════════════════════════════════
       ML LAB
    ════════════════════════════════════════════════ */
    .ml-lab-bg {
      background-image:
        linear-gradient(rgba(59,130,246,0.055) 1px, transparent 1px),
        linear-gradient(90deg, rgba(59,130,246,0.055) 1px, transparent 1px),
        linear-gradient(rgba(139,92,246,0.030) 1px, transparent 1px),
        linear-gradient(90deg, rgba(139,92,246,0.030) 1px, transparent 1px);
      background-size: 64px 64px, 64px 64px, 16px 16px, 16px 16px;
    }

    .lab-card {
      background: rgba(5,8,24,0.96);
      border: 1px solid rgba(59,130,246,0.18);
      border-radius: var(--r-lg);
      box-shadow:
        0 0 0 1px rgba(59,130,246,0.05) inset,
        0 8px 32px rgba(0,0,0,0.60),
        0 0 50px rgba(59,130,246,0.03);
    }

    /* ════════════════════════════════════════════════
       RANGE SLIDER
    ════════════════════════════════════════════════ */
    input[type=range].lab-slider {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 20px;
      background: transparent;
      cursor: pointer;
    }
    input[type=range].lab-slider:focus { outline: none; }

    input[type=range].lab-slider::-webkit-slider-runnable-track {
      height: 3px;
      background: linear-gradient(90deg, var(--blue) 0%, var(--cyan) 100%);
      border-radius: 99px;
      box-shadow: 0 0 10px rgba(59,130,246,0.4);
    }
    input[type=range].lab-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 16px; height: 16px;
      border-radius: 50%;
      background: var(--bg-base);
      border: 2px solid var(--cyan);
      box-shadow: 0 0 8px var(--cyan-glow), 0 0 16px rgba(34,211,238,0.2);
      margin-top: -6.5px;
      transition: transform 0.15s var(--ease), box-shadow 0.15s var(--ease);
    }
    input[type=range].lab-slider::-webkit-slider-thumb:hover {
      transform: scale(1.25);
      box-shadow: 0 0 14px var(--cyan), 0 0 28px var(--cyan-glow);
    }
    input[type=range].lab-slider::-moz-range-track {
      height: 3px;
      background: linear-gradient(90deg, var(--blue) 0%, var(--cyan) 100%);
      border-radius: 99px;
    }
    input[type=range].lab-slider::-moz-range-thumb {
      width: 16px; height: 16px;
      border-radius: 50%;
      background: var(--bg-base);
      border: 2px solid var(--cyan);
      box-shadow: 0 0 8px var(--cyan-glow);
    }

    /* ════════════════════════════════════════════════
       ANIMATIONS — APP COMPONENTS
    ════════════════════════════════════════════════ */

    /* Sparkle glow (planet cards) */
    @keyframes sparkle-glow {
      0%   { box-shadow: 0 0 0 0 transparent; transform: scale(1); }
      50%  { box-shadow: 0 0 24px var(--gold-glow), 0 0 48px rgba(251,191,36,0.25); transform: scale(1.06); }
      100% { box-shadow: 0 0 0 0 transparent; transform: scale(1); }
    }
    .animate-sparkle-glow { animation: sparkle-glow 1.4s ease-in-out; }

    /* Quiz correct answer */
    @keyframes sparkle-effect {
      0%   { text-shadow: none; transform: scale(1); }
      50%  { text-shadow: 0 0 16px var(--gold), 0 0 32px rgba(251,191,36,0.65); transform: scale(1.1); }
      100% { text-shadow: none; transform: scale(1); }
    }
    .correct-answer-sparkle { animation: sparkle-effect 0.65s ease-in-out; }

    /* Mission accordion */
    .mission-details {
      display: grid;
      grid-template-rows: 0fr;
      transition: grid-template-rows 0.42s var(--ease);
    }
    .mission-details > div { overflow: hidden; }
    .mission-details.expanded { grid-template-rows: 1fr; }

    /* Fade-in up (page load) */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fade-up { animation: fadeUp 0.5s var(--ease-out) both; }
    .fade-up--1 { animation-delay: 0.05s; }
    .fade-up--2 { animation-delay: 0.12s; }
    .fade-up--3 { animation-delay: 0.20s; }

    /* Pulse ring (live indicators) */
    @keyframes pulseRing {
      0%   { transform: scale(0.9); box-shadow: 0 0 0 0 var(--cyan-glow); }
      70%  { transform: scale(1);   box-shadow: 0 0 0 8px transparent; }
      100% { transform: scale(0.9); box-shadow: 0 0 0 0 transparent; }
    }
    .pulse-ring { animation: pulseRing 2s ease-in-out infinite; }

    /* ════════════════════════════════════════════════
       RECHARTS OVERRIDES
    ════════════════════════════════════════════════ */
    .recharts-cartesian-grid-horizontal line,
    .recharts-cartesian-grid-vertical   line {
      stroke: rgba(59,130,246,0.08) !important;
      stroke-dasharray: 4 4 !important;
    }
    .recharts-tooltip-wrapper .recharts-default-tooltip {
      background: rgba(5,8,24,0.97) !important;
      border: 1px solid rgba(59,130,246,0.28) !important;
      border-radius: 8px !important;
      font-family: var(--f-mono) !important;
      font-size: 11px !important;
      padding: 10px 14px !important;
      box-shadow: 0 8px 24px rgba(0,0,0,0.6) !important;
    }
    .recharts-text, .recharts-label {
      fill: var(--text-muted) !important;
      font-family: var(--f-mono) !important;
      font-size: 10px !important;
    }
    .recharts-legend-item-text {
      color: var(--text-secondary) !important;
      font-family: var(--f-mono) !important;
      font-size: 11px !important;
    }
    .recharts-tooltip-item { color: var(--blue-light) !important; }

    /* ════════════════════════════════════════════════
       STAT CARD
    ════════════════════════════════════════════════ */
    .stat-card {
      background: rgba(8,12,30,0.92);
      border: 1px solid var(--border);
      border-radius: var(--r-md);
      padding: 16px 20px;
      position: relative;
      overflow: hidden;
      transition: border-color 0.2s, transform 0.2s;
    }
    .stat-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg,
        transparent, rgba(59,130,246,0.5), transparent
      );
    }
    .stat-card:hover {
      border-color: rgba(59,130,246,0.30);
      transform: translateY(-2px);
    }

    /* ════════════════════════════════════════════════
       CHAT / COSMO
    ════════════════════════════════════════════════ */
    .chat-bubble--user {
      background: linear-gradient(135deg,
        rgba(59,130,246,0.18) 0%,
        rgba(59,130,246,0.10) 100%
      );
      border: 1px solid rgba(59,130,246,0.22);
      border-radius: var(--r-md) var(--r-md) 4px var(--r-md);
    }
    .chat-bubble--cosmo {
      background: rgba(13,18,48,0.85);
      border: 1px solid var(--border);
      border-radius: var(--r-md) var(--r-md) var(--r-md) 4px;
    }

    /* Typing dots */
    @keyframes typingDot {
      0%, 60%, 100% { transform: translateY(0);    opacity: 0.4; }
      30%            { transform: translateY(-5px); opacity: 1.0; }
    }
    .typing-dot { animation: typingDot 1.2s ease-in-out infinite; }
    .typing-dot:nth-child(2) { animation-delay: 0.15s; }
    .typing-dot:nth-child(3) { animation-delay: 0.30s; }

  </style>
